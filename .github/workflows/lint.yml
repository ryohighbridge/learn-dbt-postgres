name: Lint

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: actions/setup-python@v6.2.0
              with:
                python-version: '3.12'
                cache: 'pip'
            - name: Install dependencies
              run: python -m pip install -r requirements.txt
            - name: Lint
              run: sqlfluff lint
