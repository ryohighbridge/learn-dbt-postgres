name: learn-dbt-postgres unit test

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create profiles.yml
        run: |
          echo "learn_dbt_postgres:
            target: test
            outputs:
              test:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                pass: postgres
                dbname: postgres
                schema: test
                threads: 4" > ./profiles.yml
      - name: Install dbt dependencies
        run: dbt deps

      - name: Seed data
        run: dbt seed

      - name: Create empty dependent models for unit testing
        run: dbt run --empty

      - name: Run unit tests
        run: dbt test --select test_type:unit
